apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: config-allow-ns-ingress
spec:
  remediationAction: enforce
  severity: medium
  object-templates-raw: |
    {{- range $ns := (lookup "v1" "Namespace" "" "").items }}
      {{- $enabled := "" }}
      {{- if $ns.metadata.labels }}
        {{- $enabled = (index $ns.metadata.labels "multinetwork-policy.custom.io/enabled") }}
      {{- end }}
      {{- if eq $enabled "true" }}
        {{- $ingressPorts := "" }}
        {{- $egressPorts := "" }}
        {{- if $ns.metadata.annotations }}
          {{- $ingressPorts = (index $ns.metadata.annotations "network.custom.io/ingress-ports") }}
          {{- $egressPorts = (index $ns.metadata.annotations "network.custom.io/egress-ports") }}
        {{- end }}
        {{- range $nad := (lookup "k8s.cni.cncf.io/v1" "NetworkAttachmentDefinition" $ns.metadata.name "").items }}
          {{- if $ingressPorts }}
    - complianceType: mustonlyhave
      objectDefinition:
        apiVersion: k8s.cni.cncf.io/v1beta1
        kind: MultiNetworkPolicy
        metadata:
          name: allow-ingress-{{ $nad.metadata.name }}
          namespace: {{ $ns.metadata.name }}
          annotations:
            k8s.v1.cni.cncf.io/policy-for: {{ $ns.metadata.name }}/{{ $nad.metadata.name }}
        spec:
          podSelector: {}
          ingress:
            - ports:
              {{- range $entry := (splitList "," $ingressPorts) }}
                {{- $parts := (splitList "/" ($entry | trim)) }}
                {{- $portNum := (index $parts 0 | trim | atoi) }}
                {{- $proto := "TCP" }}
                {{- if gt (len $parts) 1 }}
                  {{- $proto = (index $parts 1 | trim | upper) }}
                {{- end }}
                - port: {{ $portNum }}
                  protocol: {{ $proto }}
              {{- end }}
          policyTypes:
            - Ingress
          {{- end }}
          {{- if $egressPorts }}
    - complianceType: mustonlyhave
      objectDefinition:
        apiVersion: k8s.cni.cncf.io/v1beta1
        kind: MultiNetworkPolicy
        metadata:
          name: allow-egress-{{ $nad.metadata.name }}
          namespace: {{ $ns.metadata.name }}
          annotations:
            k8s.v1.cni.cncf.io/policy-for: {{ $ns.metadata.name }}/{{ $nad.metadata.name }}
        spec:
          podSelector: {}
          egress:
            - ports:
              {{- range $entry := (splitList "," $egressPorts) }}
                {{- $parts := (splitList "/" ($entry | trim)) }}
                {{- $portNum := (index $parts 0 | trim | atoi) }}
                {{- $proto := "TCP" }}
                {{- if gt (len $parts) 1 }}
                  {{- $proto = (index $parts 1 | trim | upper) }}
                {{- end }}
                - port: {{ $portNum }}
                  protocol: {{ $proto }}
              {{- end }}
          policyTypes:
            - Egress
          {{- end }}
        {{- end }}
      {{- end }}
    {{- end }}
