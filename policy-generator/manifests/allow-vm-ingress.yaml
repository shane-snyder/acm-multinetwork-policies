apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: config-allow-vm-ingress
spec:
  remediationAction: enforce
  severity: medium
  object-templates-raw: |
    {{- /* Loop over every Namespace in the cluster */ -}}
    {{- range $ns := (lookup "v1" "Namespace" "" "").items }}
      {{- /* Default to empty in case the namespace has no labels block */ -}}
      {{- $enabled := "" }}
      {{- if $ns.metadata.labels }}
        {{- /* Read the enabled label off the namespace */ -}}
        {{- $enabled = (index $ns.metadata.labels "multinetwork-policy.custom.io/enabled") }}
      {{- end }}
      {{- /* Only proceed if the namespace opted in */ -}}
      {{- if eq $enabled "true" }}
        {{- /* Loop over every VirtualMachine in this namespace */ -}}
        {{- range $vm := (lookup "kubevirt.io/v1" "VirtualMachine" $ns.metadata.name "").items }}
          {{- /* Default to empty in case the VM has no annotations block */ -}}
          {{- $vmIngressPorts := "" }}
          {{- $vmEgressPorts := "" }}
          {{- if $vm.metadata.annotations }}
            {{- /* Read the comma-separated port lists from the VM annotations */ -}}
            {{- $vmIngressPorts = (index $vm.metadata.annotations "network.custom.io/ingress-ports") }}
            {{- $vmEgressPorts = (index $vm.metadata.annotations "network.custom.io/egress-ports") }}
          {{- end }}
          {{- /* Loop over each network attachment defined on the VM */ -}}
          {{- range $net := $vm.spec.template.spec.networks }}
            {{- /* Skip non-multus attachments like the primary pod network */ -}}
            {{- if $net.multus }}
              {{- /* The NAD this attachment binds to */ -}}
              {{- $netName := $net.multus.networkName }}
              {{- /* Only emit an ingress MNP if ingress-ports was set on the VM */ -}}
              {{- if $vmIngressPorts }}
    - complianceType: mustonlyhave
      objectDefinition:
        apiVersion: k8s.cni.cncf.io/v1beta1
        kind: MultiNetworkPolicy
        metadata:
          name: allow-vm-ingress-{{ $vm.metadata.name }}-{{ $netName }}
          namespace: {{ $ns.metadata.name }}
          annotations:
            k8s.v1.cni.cncf.io/policy-for: {{ $ns.metadata.name }}/{{ $netName }}
        spec:
          podSelector:
            matchLabels:
              vm.kubevirt.io/name: {{ $vm.metadata.name }}
          ingress:
            - ports:
              {{- /* Loop over each comma-separated port entry */ -}}
              {{- range $entry := (splitList "," $vmIngressPorts) }}
                {{- /* Split on "/" so "53/udp" becomes ["53", "udp"] */ -}}
                {{- $parts := (splitList "/" ($entry | trim)) }}
                {{- /* First part is always the port number */ -}}
                {{- $portNum := (index $parts 0 | trim | atoi) }}
                {{- /* Default protocol is TCP */ -}}
                {{- $proto := "TCP" }}
                {{- if gt (len $parts) 1 }}
                  {{- /* Use the suffix as protocol, uppercased */ -}}
                  {{- $proto = (index $parts 1 | trim | upper) }}
                {{- end }}
                - port: {{ $portNum }}
                  protocol: {{ $proto }}
              {{- end }}
          policyTypes:
            - Ingress
              {{- end }}
              {{- /* Only emit an egress MNP if egress-ports was set on the VM */ -}}
              {{- if $vmEgressPorts }}
    - complianceType: mustonlyhave
      objectDefinition:
        apiVersion: k8s.cni.cncf.io/v1beta1
        kind: MultiNetworkPolicy
        metadata:
          name: allow-vm-egress-{{ $vm.metadata.name }}-{{ $netName }}
          namespace: {{ $ns.metadata.name }}
          annotations:
            k8s.v1.cni.cncf.io/policy-for: {{ $ns.metadata.name }}/{{ $netName }}
        spec:
          podSelector:
            matchLabels:
              vm.kubevirt.io/name: {{ $vm.metadata.name }}
          egress:
            - ports:
              {{- range $entry := (splitList "," $vmEgressPorts) }}
                {{- $parts := (splitList "/" ($entry | trim)) }}
                {{- $portNum := (index $parts 0 | trim | atoi) }}
                {{- $proto := "TCP" }}
                {{- if gt (len $parts) 1 }}
                  {{- $proto = (index $parts 1 | trim | upper) }}
                {{- end }}
                - port: {{ $portNum }}
                  protocol: {{ $proto }}
              {{- end }}
          policyTypes:
            - Egress
              {{- end }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
    {{- end }}
